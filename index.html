<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paper-digest · Yi-Wei Chen</title>
<style>
  :root {
    --bg: #fdfcf9;
    --panel: #ffffff;
    --border: #d0d7de;
    --text: #1f2328;
    --muted: #57606a;
    --accent: #0969da;
    --accent-hover: #0550ae;
    --row-hover: #f6f5f1;
    --th-bg: #f6f5f1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 4rem 1.5rem;
  }
  header { margin-bottom: 3rem; }
  h1 {
    font-family: Georgia, "Source Serif Pro", "Noto Serif TC", serif;
    font-size: 2.4rem;
    margin: 0 0 0.5rem;
    letter-spacing: -0.01em;
    font-weight: 700;
  }
  .subtitle { color: var(--muted); margin: 0; }
  .meta { color: var(--muted); font-size: 0.9rem; margin-top: 0.75rem; }
  .meta a { color: var(--accent); text-decoration: none; }
  .meta a:hover { color: var(--accent-hover); text-decoration: underline; }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border: 1px solid var(--border);
  }
  th, td {
    padding: 0.9rem 1rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th {
    background: var(--th-bg);
    font-weight: 600;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  td.paper, td.venue {
    font-family: Georgia, "Source Serif Pro", "Noto Serif TC", serif;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--row-hover); }
  td a { color: var(--accent); text-decoration: none; }
  td a:hover { color: var(--accent-hover); text-decoration: underline; }
  .tag {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    font-size: 0.78rem;
    border-radius: 3px;
    background: #eaeef2;
    color: #1f2328;
    border: 1px solid #d0d7de;
    font-family: Georgia, serif;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
    font-style: italic;
  }
  footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.85rem;
    font-family: Georgia, serif;
    font-style: italic;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { color: var(--accent-hover); text-decoration: underline; }
  code {
    background: #eaeef2;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.85em;
    font-style: normal;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 paper-digest</h1>
    <p class="subtitle">繁體中文 / English paper summaries</p>
    <p class="meta">
      Maintained by <a href="https://github.com/YIWEI-CHEN">@YIWEI-CHEN</a> ·
      <a href="https://github.com/YIWEI-CHEN/paper-digest">source on GitHub</a>
    </p>
  </header>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Paper</th>
        <th>Venue / Year</th>
        <th>Summary</th>
      </tr>
    </thead>
    <tbody>
      <!-- Add new rows here. Example:
      <tr>
        <td>2026-05-29</td>
        <td class="paper">E-SQL: Direct Schema Linking via Question Enrichment</td>
        <td class="venue"><span class="tag">arXiv 2024</span></td>
        <td>
          <a href="summaries/zh-TW/2024-caferoglu-esql.html">繁中</a> ·
          <a href="summaries/en/2024-caferoglu-esql.html">EN</a>
        </td>
      </tr>
      -->
      <tr>
        <td colspan="4" class="empty">No summaries yet — first one coming soon.</td>
      </tr>
    </tbody>
  </table>

  <footer>
    Generated with the <a href="skills/arxiv-html-summary/SKILL.md"><code>arxiv-html-summary</code></a> skill.
  </footer>
</div>
</body>
</html>
